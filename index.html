<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشمي الزراعي 🇯🇴</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&display=swap');

        :root {
            --neon-green: #00ff88;
            --cyber-blue: #00d1ff;
            --deep-dark: #080a0f;
            --glass-panel: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(0, 255, 136, 0.2);
            --danger: #ff4b4b;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            background-color: var(--deep-dark);
            color: #fff; margin: 0; min-height: 100vh;
            background-image: radial-gradient(circle at top right, #111b27, transparent);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .notif-bar {
            background: linear-gradient(90deg, var(--neon-green), var(--cyber-blue));
            padding: 10px 25px; border-radius: 50px; display: inline-flex; align-items: center;
            gap: 10px; cursor: pointer; color: #000; font-weight: 900; margin-bottom: 30px;
            box-shadow: 0 0 20px var(--border-glow);
        }

        .timer-zone {
            background: var(--glass-panel); border: 1px solid var(--border-glow);
            padding: 25px; border-radius: 30px; display: flex; align-items: center;
            justify-content: space-around; margin-bottom: 40px; backdrop-filter: blur(10px); flex-wrap: wrap;
        }
        .timer-inputs { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .clock { font-size: 2rem; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 15px var(--neon-green); }

        .cats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .cat-card {
            background: var(--glass-panel); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 25px; text-align: center; cursor: pointer;
        }
        .cat-card:hover { border-color: var(--neon-green); transform: translateY(-10px); background: rgba(0,255,136,0.05); }
        .cat-card img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; margin-bottom: 15px; }

        #subPage, #detailPage { display: none; animation: slideUp 0.5s ease; }
        .sub-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
        .btn-back { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 12px; cursor: pointer; }

        .search-area { position: relative; margin-bottom: 30px; }
        .search-area input {
            width: 100%; background: var(--glass-panel); border: 1px solid var(--border-glow);
            padding: 15px 25px; border-radius: 15px; color: #fff; font-size: 1.1rem;
        }

        .notes-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* تصميم الملاحظة مع زر الحذف */
        .note-card {
            background: rgba(255,255,255,0.02); border-right: 4px solid var(--cyber-blue);
            padding: 20px; border-radius: 15px; position: relative;
        }
        .delete-btn {
            position: absolute; top: 10px; left: 10px; 
            width: 25px; height: 25px; background: rgba(255, 75, 75, 0.2);
            color: var(--danger); border: 1px solid var(--danger);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; font-size: 12px;
        }
        .delete-btn:hover { background: var(--danger); color: white; }

        .btn-action { cursor: pointer; font-weight: bold; margin-top: 10px; display: inline-block; margin-left: 15px; }
        
        .full-img-small { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 2px solid var(--neon-green); }

        .camera-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; margin-top: 30px; border: 1px dashed var(--cyber-blue); }
        #videoFeed { width: 100%; max-width: 400px; border-radius: 15px; display: none; margin: 0 auto; }
        .captured-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .gallery-item { background: var(--glass-panel); padding: 10px; border-radius: 15px; }
        .gallery-item img { width: 100%; border-radius: 10px; }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-box { background: #111; padding: 40px; border-radius: 30px; width: 90%; max-width: 500px; border: 1px solid var(--neon-green); }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; margin-top: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container" id="homePage">
    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 3rem; margin: 0;">نشمي <span style="color: var(--neon-green);">الزراعي 🇯🇴</span></h1>
        <p style="opacity: 0.6;">خزنة الأرض الطيبة - توثيق ومتابعة ميدانية</p>
    </div>

    <div style="display: flex; justify-content: center;">
        <div class="notif-bar" onclick="askPermission()">🔔 تفعيل تنبيهات الهاتف</div>
    </div>

    <div class="timer-zone">
        <div class="timer-inputs">
            <input type="number" id="tDays" placeholder="أيام" style="width: 70px;">
            <input type="number" id="tHours" placeholder="ساعات" style="width: 70px;">
            <input type="number" id="tMins" placeholder="دقائق" style="width: 70px;">
            <button onclick="startTimer()" style="background:var(--neon-green); border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">ابدأ التوقيت</button>
        </div>
        <div class="clock" id="clock">00ي : 00س : 00د</div>
    </div>

    <div style="background: var(--glass-panel); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);">
        <h3 style="margin:0">➕ إضافة صنف زراعي</h3>
        <input type="text" id="catInp" placeholder="اسم الصنف...">
        <input type="file" id="iconInp" accept="image/*">
        <button onclick="saveCat()" style="width: 100%; margin-top: 10px;" class="notif-bar">حفظ الصنف</button>
    </div>

    <div class="cats-grid" id="catGrid"></div>
</div>

<div class="container" id="subPage">
    <div class="sub-header">
        <div class="btn-back" onclick="backToHome()">⬅ عودة</div>
        <h1 id="subTitle" style="color: var(--neon-green);"></h1>
    </div>
    <div class="search-area">
        <input type="text" id="innerSearch" placeholder="ابحث في سجلات الصنف..." onkeyup="searchInside()">
    </div>
    <button onclick="showAddNote()" class="notif-bar" style="margin-bottom: 30px; background: var(--cyber-blue);">+ ملاحظة جديدة</button>
    <div class="notes-list" id="notesList"></div>
</div>

<div class="container" id="detailPage">
    <div class="btn-back" onclick="backToSub()">⬅ عودة للقسم</div>
    <div id="fullContent" style="background: var(--glass-panel); padding: 30px; border-radius: 30px; margin-top: 20px;"></div>
    
    <div class="camera-box">
        <h3>📸 توثيق ميداني (تصوير مباشر)</h3>
        <video id="videoFeed" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        
        <div id="cameraControls" style="margin-top:15px;">
            <button id="startCamBtn" onclick="startCamera()" class="btn-action" style="color:var(--cyber-blue)">فتح الكاميرا</button>
            <div id="captureArea" style="display:none; margin-top:10px;">
                <input type="text" id="photoTitle" placeholder="عنوان الصورة (مثلاً: حالة الأوراق)...">
                <button onclick="takePhoto()" class="notif-bar" style="width:100%; margin-top:10px;">إلتقاط وحفظ</button>
            </div>
        </div>

        <div class="captured-gallery" id="photoGallery"></div>
    </div>
</div>

<div class="modal" id="noteModal">
    <div class="modal-box">
        <h3 id="modalCatName"></h3>
        <input type="text" id="nTitle" placeholder="العنوان...">
        <textarea id="nText" rows="5" placeholder="التفاصيل..."></textarea>
        <button id="saveNoteBtn" onclick="saveNote()" class="notif-bar" style="width: 100%; margin-top: 20px;">حفظ</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('AgriJordan_DB')) || { cats: [], notes: [] };
    let currentCatId = null;
    let currentNoteId = null;
    let editNoteId = null;
    let stream = null;

    function saveCat() {
        const name = document.getElementById('catInp').value;
        const file = document.getElementById('iconInp').files[0];
        if(!name || !file) return;
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = () => {
            db.cats.push({ id: Date.now(), name, icon: r.result });
            render();
            document.getElementById('catInp').value = '';
        };
    }

    function render() {
        localStorage.setItem('AgriJordan_DB', JSON.stringify(db));
        const grid = document.getElementById('catGrid');
        grid.innerHTML = '';
        db.cats.forEach(c => {
            grid.innerHTML += `
                <div class="cat-card" onclick="openCat(${c.id}, '${c.name}')">
                    <img src="${c.icon}">
                    <h3>${c.name}</h3>
                </div>`;
        });
    }

    function openCat(id, name) {
        currentCatId = id;
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('subPage').style.display = 'block';
        document.getElementById('subTitle').innerText = name;
        searchInside();
    }

    function searchInside() {
        const term = document.getElementById('innerSearch').value.toLowerCase();
        const list = document.getElementById('notesList');
        list.innerHTML = '';
        const filtered = db.notes.filter(n => n.catId == currentCatId && n.title.toLowerCase().includes(term));
        filtered.reverse().forEach(n => {
            list.innerHTML += `
                <div class="note-card">
                    <div class="delete-btn" onclick="deleteNote(${n.id})">X</div>
                    <h3>${n.title}</h3>
                    <div class="btn-action" style="color:var(--neon-green)" onclick="showFull(${n.id})">فتح التفاصيل والتصوير</div>
                    <div class="btn-action" style="color:var(--cyber-blue)" onclick="editNote(${n.id})">تعديل</div>
                </div>`;
        });
    }

    function deleteNote(id) {
        if(confirm("هل أنت متأكد من حذف هذه الملاحظة وسجل صورها؟")) {
            db.notes = db.notes.filter(n => n.id !== id);
            localStorage.setItem('AgriJordan_DB', JSON.stringify(db));
            searchInside();
        }
    }

    function showAddNote() {
        editNoteId = null;
        document.getElementById('nTitle').value = '';
        document.getElementById('nText').value = '';
        document.getElementById('noteModal').style.display = 'flex';
    }

    function editNote(id) {
        const note = db.notes.find(x => x.id == id);
        editNoteId = id;
        document.getElementById('nTitle').value = note.title;
        document.getElementById('nText').value = note.text;
        document.getElementById('noteModal').style.display = 'flex';
    }

    function saveNote() {
        const title = document.getElementById('nTitle').value;
        const text = document.getElementById('nText').value;
        if(editNoteId) {
            const idx = db.notes.findIndex(x => x.id == editNoteId);
            db.notes[idx] = { ...db.notes[idx], title, text };
        } else {
            db.notes.push({ id: Date.now(), catId: currentCatId, title, text, photos: [] });
        }
        localStorage.setItem('AgriJordan_DB', JSON.stringify(db));
        document.getElementById('noteModal').style.display = 'none';
        searchInside();
    }

    function showFull(id) {
        currentNoteId = id;
        const n = db.notes.find(x => x.id == id);
        const c = db.cats.find(x => x.id == n.catId);
        document.getElementById('subPage').style.display = 'none';
        document.getElementById('detailPage').style.display = 'block';
        document.getElementById('fullContent').innerHTML = `
            <img src="${c.icon}" class="full-img-small">
            <h1 style="color:var(--neon-green)">${n.title}</h1>
            <p style="white-space: pre-wrap;">${n.text}</p>
        `;
        renderGallery();
    }

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.getElementById('videoFeed');
            video.srcObject = stream;
            video.style.display = 'block';
            document.getElementById('startCamBtn').style.display = 'none';
            document.getElementById('captureArea').style.display = 'block';
        } catch (err) { alert("تعذر فتح الكاميرا."); }
    }

    function takePhoto() {
        const video = document.getElementById('videoFeed');
        const canvas = document.getElementById('canvas');
        const photoTitle = document.getElementById('photoTitle').value || "بدون عنوان";
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const dataUrl = canvas.toDataURL('image/jpeg');
        const noteIdx = db.notes.findIndex(n => n.id === currentNoteId);
        if(!db.notes[noteIdx].photos) db.notes[noteIdx].photos = [];
        db.notes[noteIdx].photos.push({ title: photoTitle, img: dataUrl });
        localStorage.setItem('AgriJordan_DB', JSON.stringify(db));
        document.getElementById('photoTitle').value = '';
        renderGallery();
        stopCamera();
    }

    function stopCamera() {
        if(stream) stream.getTracks().forEach(track => track.stop());
        document.getElementById('videoFeed').style.display = 'none';
        document.getElementById('startCamBtn').style.display = 'inline-block';
        document.getElementById('captureArea').style.display = 'none';
    }

    function renderGallery() {
        const note = db.notes.find(n => n.id === currentNoteId);
        const gallery = document.getElementById('photoGallery');
        gallery.innerHTML = '';
        if(note.photos) {
            note.photos.forEach(p => {
                gallery.innerHTML += `
                    <div class="gallery-item">
                        <img src="${p.img}">
                        <p style="font-size:0.8rem; margin:5px 0;">${p.title}</p>
                    </div>`;
            });
        }
    }

    function backToHome() { document.getElementById('homePage').style.display = 'block'; document.getElementById('subPage').style.display = 'none'; render(); }
    function backToSub() { stopCamera(); document.getElementById('detailPage').style.display = 'none'; document.getElementById('subPage').style.display = 'block'; }

    function askPermission() { Notification.requestPermission(); }

    function startTimer() {
        const d = parseInt(document.getElementById('tDays').value) || 0;
        const h = parseInt(document.getElementById('tHours').value) || 0;
        const m = parseInt(document.getElementById('tMins').value) || 0;
        let total = (d * 86400) + (h * 3600) + (m * 60);
        if(total <= 0) return;
        let interval = setInterval(() => {
            let days = Math.floor(total / 86400);
            let hours = Math.floor((total % 86400) / 3600);
            let mins = Math.floor((total % 3600) / 60);
            let secs = total % 60;
            document.getElementById('clock').innerText = `${days}ي : ${hours}س : ${mins}د : ${secs}ث`;
            if(total-- <= 0) { clearInterval(interval); new Notification("نشمي الزراعي: انتهى الوقت!"); }
        }, 1000);
    }

    render();
</script>
</body>
</html>
