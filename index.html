<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الزراعة الأردنية | Ultra-Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-glow: #7ae582;
            --secondary-glow: #25a18e;
            --dark-bg: #050a07;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 50% -20%, #1b4332 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #081c15 0%, transparent 40%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-page { width: 100%; max-width: 1150px; display: block; }

        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 80px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .jordan-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(206, 17, 38, 0.1);
            border: 1px solid #ce1126;
            color: #ff9999;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .header h1 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
            margin-top: 50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 35px;
            padding: 50px 30px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .card:hover { transform: translateY(-15px); border-color: var(--primary-glow); }

        #veg-fruit-section { display: none; margin-top: 40px; }
        
        .count-badge {
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            color: var(--dark-bg);
            padding: 5px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(122, 229, 130, 0.4);
        }

        .search-box { width: 100%; max-width: 500px; margin: 0 auto 30px; position: relative; }
        .search-box input {
            width: 100%; padding: 15px 50px 15px 20px; border-radius: 20px;
            border: 1px solid var(--primary-glow); background: rgba(255,255,255,0.05); color: #fff;
        }
        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; max-height: 500px; overflow-y: auto; padding: 10px;
        }
        .item-btn {
            padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: #fff; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .item-btn:hover { background: var(--primary-glow); color: var(--dark-bg); }
        .item-btn i { display: block; font-size: 1.5rem; margin-bottom: 8px; }

        .details-page {
            display: none; width: 100%; max-width: 900px;
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border-radius: 40px; padding: 40px; border: 1px solid var(--primary-glow);
            animation: fadeIn 0.5s ease;
        }
        .details-icon { font-size: 4rem; color: var(--primary-glow); text-align: center; margin-bottom: 10px; }
        .details-title { font-size: 2.5rem; text-align: center; margin-bottom: 30px; color: #fff; border-bottom: 1px solid rgba(122, 229, 130, 0.3); padding-bottom: 10px; }
        
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 20px; text-align: right; }
        .info-section { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; border-right: 4px solid var(--primary-glow); }
        .info-section h4 { color: var(--primary-glow); margin-bottom: 10px; font-size: 1.3rem; }
        .info-section p { line-height: 1.8; color: #cbd5e1; white-space: pre-line; }

        .back-btn {
            display: block; width: fit-content; margin: 30px auto 0;
            padding: 12px 35px; border-radius: 15px; border: none;
            background: var(--primary-glow); color: var(--dark-bg);
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .sub-menu { display: none; margin-top: 20px; gap: 10px; justify-content: center; }
        .btn-sub { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--primary-glow); background: transparent; color: var(--primary-glow); cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="mainPage" class="main-page">

                </div>
                <div class="card" onclick="alert('قسم المواعيد')">

                    <h3>مواقيت الخير للغرس</h3>
                </div>
                <div class="card" onclick="alert('قسم التسميد')">
                    <div style="font-size: 3.5rem; margin-bottom: 20px;"><i class="fa-solid fa-flask-vial"></i></div>
                    <h3>دليل التسميد والنمو</h3>
                </div>
            </div>

            <div id="veg-fruit-section">
                <div class="count-badge">115 صنف زراعي</div>
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass" style="position:absolute; right:20px; top:18px; color:var(--primary-glow)"></i>

        </div>
    </div>

            "كستناء": { region: "عجلون، جرش (باردة).", seeds: "شتلات (أفضل).", transfer: "6–8 متر.", weather: "بارد شتاءً.", organic: "كومبوست + زبل متحلل.", method: "تقليل نيتروجين.", benefits: "فوائد: كربوهيدرات صحية / أضرار: نشويات." },
            "تمر هندي": { region: "الأغوار والدافئة.", seeds: "بذور أو شتلات.", transfer: "4–6 متر.", weather: "حار إلى معتدل.", organic: "كومبوست + زبل متحلل.", method: "بوتاسيوم للإثمار.", benefits: "فوائد: يخفض الحرارة / أضرار: حموضة." }
        };

        function toggleSubMenu() {
            const menu = document.getElementById('sub-menu-plants');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        function openVegFruit() {
            document.getElementById('veg-fruit-section').style.display = 'block';
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = '';
            vegFruitData.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'item-btn';
                btn.innerHTML = `<i class="${item.icon}"></i>${item.name}`;
                btn.onclick = () => openDetails(item);
                grid.appendChild(btn);
            });
            window.scrollTo({ top: document.getElementById('veg-fruit-section').offsetTop, behavior: 'smooth' });
        }

        function filterItems() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const btns = document.getElementsByClassName('item-btn');
            for (let btn of btns) {
                btn.style.display = btn.innerText.includes(input) ? "block" : "none";
            }
        }

        function openDetails(item) {
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('detailsPage').style.display = 'block';
            document.getElementById('detailsIcon').innerHTML = `<i class="${item.icon}"></i>`;
            document.getElementById('detailsTitle').innerText = item.name;
            
            const contentDiv = document.getElementById('detailsContent');
            const g = cropGuides[item.name];
            
            if(g) {
                contentDiv.innerHTML = `
                    <div class="info-section"><h4>📍 1- مناطق الزراعة في الأردن</h4><p>${g.region}</p></div>
                    <div class="info-section"><h4>🌱 2- طريقة الزراعة</h4><p>${g.seeds}</p></div>
                    <div class="info-section"><h4>🚜 3- النقل والمسافات</h4><p>${g.transfer}</p></div>
                    <div class="info-section"><h4>☀️ 4- الجو المناسب</h4><p>${g.weather}</p></div>
                    <div class="info-section"><h4>🍃 5- أفضل أنواع الأسمدة الطبيعية</h4><p>${g.organic}</p></div>
                    <div class="info-section"><h4>🧪 6- طريقة التسميد</h4><p>${g.method}</p></div>
                    <div class="info-section"><h4>⚖️ 7- الفوائد والأضرار</h4><p>${g.benefits}</p></div>
                `;
            } else {
                contentDiv.innerHTML = `<div class="info-section"><h4>⚠️ تنبيه</h4><p>يرجى تزويدنا بالشرح الخاص بهذا الصنف لإضافته للكود.</p></div>`;
            }
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('detailsPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
        }
    </script>
</body>
</html>
